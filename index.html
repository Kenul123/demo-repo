<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE ZONE 2K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #FF006E;
            --neon-cyan: #00D9FF;
            --neon-yellow: #FFBE0B;
            --neon-green: #05FFA1;
            --neon-purple: #B537F2;
            --arcade-dark: #0a0e27;
            --arcade-darker: #050812;
        }

        @font-face {
            font-family: 'Arcade';
            src: url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(180deg, var(--arcade-darker) 0%, var(--arcade-dark) 50%, var(--arcade-darker) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            animation: arcadeFlicker 0.15s infinite;
        }

        @keyframes arcadeFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.97; }
        }

        /* CRT scanlines effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        /* Arcade cabinet frame */
        .arcade-frame {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 8px solid;
            border-color: var(--neon-cyan) var(--neon-pink) var(--neon-yellow) var(--neon-purple);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 92%;
            box-shadow: 
                0 0 40px var(--neon-cyan),
                0 0 80px var(--neon-pink),
                inset 0 0 30px rgba(0, 0, 0, 0.8),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
            animation: cabinetGlow 3s ease-in-out infinite;
        }

        @keyframes cabinetGlow {
            0%, 100% {
                box-shadow: 
                    0 0 40px var(--neon-cyan),
                    0 0 80px var(--neon-pink),
                    inset 0 0 30px rgba(0, 0, 0, 0.8),
                    inset 0 2px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 50px var(--neon-cyan),
                    0 0 100px var(--neon-pink),
                    inset 0 0 30px rgba(0, 0, 0, 0.8),
                    inset 0 2px 0 rgba(255, 255, 255, 0.1);
            }
        }

        /* Screen display */
        .screen {
            background: linear-gradient(135deg, #001a33 0%, #002a52 100%);
            border: 4px solid var(--neon-cyan);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 
                inset 0 0 20px rgba(0, 217, 255, 0.3),
                0 0 20px var(--neon-cyan);
            position: relative;
            overflow: hidden;
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 217, 255, 0.03),
                rgba(0, 217, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .screen-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .game-title {
            font-size: 1.8em;
            color: var(--neon-yellow);
            text-shadow: 
                0 0 10px var(--neon-yellow),
                0 0 20px var(--neon-pink),
                2px 2px 0 var(--neon-cyan);
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px var(--neon-yellow),
                    0 0 20px var(--neon-pink),
                    2px 2px 0 var(--neon-cyan);
            }
            50% { 
                text-shadow: 
                    0 0 20px var(--neon-yellow),
                    0 0 40px var(--neon-pink),
                    2px 2px 0 var(--neon-cyan);
            }
        }

        .subtitle {
            font-size: 0.6em;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            margin: 20px 0;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 0.5em;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 10px;
            border-radius: 4px;
            background: rgba(5, 255, 161, 0.05);
        }

        .score-display {
            text-align: left;
        }

        .level-display {
            text-align: center;
        }

        .lives-display {
            text-align: right;
        }

        /* Game screen content */
        .combo-display {
            font-size: 1.2em;
            color: var(--neon-pink);
            text-shadow: 
                0 0 10px var(--neon-pink),
                2px 2px 0 var(--neon-cyan);
            margin: 15px 0;
            animation: comboPulse 0.5s ease-out;
        }

        @keyframes comboPulse {
            0% { 
                font-size: 1.5em;
                opacity: 1;
            }
            100% { 
                font-size: 1.2em;
                opacity: 0.8;
            }
        }

        .counter-value {
            font-size: 2.5em;
            color: var(--neon-yellow);
            text-shadow: 
                0 0 20px var(--neon-yellow),
                0 0 40px var(--neon-pink),
                3px 3px 0 var(--neon-cyan);
            margin: 20px 0;
            font-weight: bold;
            animation: screenGlow 1.5s ease-in-out infinite;
        }

        @keyframes screenGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 20px var(--neon-yellow),
                    0 0 40px var(--neon-pink),
                    3px 3px 0 var(--neon-cyan);
            }
            50% { 
                text-shadow: 
                    0 0 30px var(--neon-yellow),
                    0 0 60px var(--neon-pink),
                    3px 3px 0 var(--neon-cyan);
            }
        }

        /* Control panel */
        .controls {
            background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 4px solid var(--neon-purple);
            border-radius: 8px;
            padding: 25px;
            margin-top: 25px;
            box-shadow: 
                0 0 15px var(--neon-purple),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5em;
            padding: 15px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.1s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-play {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-yellow));
            color: #000;
            box-shadow: 
                0 8px 0 rgba(255, 0, 110, 0.5),
                0 0 20px var(--neon-pink);
            border: 3px solid var(--neon-pink);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 rgba(255, 0, 110, 0.7),
                0 0 30px var(--neon-pink);
        }

        .btn-play:active {
            transform: translateY(6px);
            box-shadow: 
                0 2px 0 rgba(255, 0, 110, 0.7),
                0 0 10px var(--neon-pink);
        }

        .btn-reset {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-green));
            color: #000;
            box-shadow: 
                0 8px 0 rgba(0, 217, 255, 0.5),
                0 0 20px var(--neon-cyan);
            border: 3px solid var(--neon-cyan);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 rgba(0, 217, 255, 0.7),
                0 0 30px var(--neon-cyan);
        }

        .btn-reset:active {
            transform: translateY(6px);
            box-shadow: 
                0 2px 0 rgba(0, 217, 255, 0.7),
                0 0 10px var(--neon-cyan);
        }

        /* Stats panel */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--neon-green);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(5, 255, 161, 0.2);
        }

        .stat-value {
            font-size: 1.2em;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.35em;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        /* Marquee effect */
        .marquee {
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-yellow);
            border-radius: 4px;
            padding: 8px;
            margin-top: 15px;
            box-shadow: 0 0 10px var(--neon-yellow);
        }

        .marquee-text {
            font-size: 0.4em;
            color: var(--neon-yellow);
            text-shadow: 0 0 10px var(--neon-yellow);
            white-space: nowrap;
            animation: marquee 8s linear infinite;
            display: inline-block;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 600px) {
            .arcade-frame {
                padding: 25px;
            }

            .game-title {
                font-size: 1.2em;
            }

            .counter-value {
                font-size: 1.8em;
            }

            button {
                font-size: 0.4em;
                padding: 12px 18px;
            }

            .stats-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="arcade-frame">
        <div class="screen">
            <div class="screen-content">
                <div class="game-title">★ ARCADE ZONE 2K ★</div>
                <div class="subtitle">>> CLICK COUNTER EDITION <<</div>
                
                <div class="status-bar">
                    <div class="score-display">SCORE: <span id="stat-clicks">0</span></div>
                    <div class="level-display">LEVEL: 1</div>
                    <div class="lives-display">LIVES: ∞</div>
                </div>

                <div class="divider"></div>

                <div class="combo-display" id="combo">GET CLICKING!</div>
                
                <div class="counter-value" id="count">0</div>

                <div style="font-size: 0.45em; color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); margin: 15px 0;">
                    >>> PRESS SPACEBAR OR CLICK <<<
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="button-group">
                <button class="btn-play" onclick="incrementCounter()">► PLAY</button>
                <button class="btn-reset" onclick="resetCounter()">↻ RESET</button>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <div class="stat-value" id="max-combo">0x</div>
                    <div class="stat-label">MAX COMBO</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">∞</div>
                    <div class="stat-label">CAPACITY</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">100%</div>
                    <div class="stat-label">EPIC</div>
                </div>
            </div>

            <div class="marquee">
                <div class="marquee-text">
                    ★ KEEP CLICKING FOR COMBOS! ★ BREAK THE HIGH SCORE! ★ GET MAX COMBO! ★ 
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
